{% extends "base.html" %}
{% block content %}

<div style="margin-bottom:16px;">
  <a href="{{ url_for('movie_detail', movie_id=movie_id) }}" class="btn secondary">
    ← Back
  </a>
</div>

<section class="card">
  <h3>Edit Comment</h3>
  <form method="POST">
    <label class="label">Your comment</label>
    <textarea class="input" name="content" rows="4">{{ comment.content }}</textarea>

    <div class="row gap" style="margin-top:12px;">
      <button class="btn primary" type="submit">Save</button>
      <a class="btn secondary" href="{{ url_for('movie_detail', movie_id=movie_id) }}">
        Cancel
      </a>
    </div>
  </form>
</section>

{% endblock %}
