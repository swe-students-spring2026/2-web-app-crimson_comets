{% extends 'base.html' %}

{% block content %}
 
<div style="text-align: center;">
  <h2 style="margin-bottom: 0;">Post Your Film</h2>
  <p class="muted" style="margin-top: 0px;">
    Post a film that you wrote/directed.
  </p>
</div>

<section class="card">
  <div class="card-body">
  <form method="POST" class="stack-form" action="/post">

    <label class="label" for="title">Movie Title *</label>
    <input class="input" id="title" name="title" type="text" placeholder="e.g., Dune" required>

    <label class="label" for="year">Release Year *</label>
    <input class="input" id="year" name="year" type="text" placeholder="e.g., 2026" required>

    <label class="label" for="genre">Genre</label>
    <input class="input" id="genre" name="genre" type="text" placeholder="e.g., Sci-Fi, Drama">

    <label class="label" for="logline">Log Line</label>
    <textarea class="input" id="logline" name="logline" rows="2" placeholder="one sentence summary (remember to 'hook' your audience)"></textarea>

    <label class="label" for="cast">Cast (comma-separated)</label>
    <input class="input" id="cast" name="cast" type="text" placeholder="e.g., Timothée Chalamet, Zendaya">

    <label class="label" for="crew">Crew (comma-separated)</label>
    <input class="input" id="crew" name="crew" type="text" placeholder="e.g., Cinematographer: Greig Fraser">

    <label class="label" for="poster">Poster</label>
    <input class="input" type="file" id="poster" name="poster" accept="image/*">

    <label class="label" for="stills">Film Stills</label>
    <input class="input" type="file" id="stills" name="stills" accept="image/*">

    <label class="label" for="bts">BTS photos (optional)</label>
    <input class="input" type="file" id="bts" name="bts" accept="image/*">

    <label class="label" for="awards">Awards (optional)</label>
    <textarea class="input" id="awards" name="awards" rows="1" placeholder="List awards here"></textarea>

    <label class="label" for="pn">Production Notes (optional)</label>
    <textarea class="input" id="pn" name="pn" rows="3" placeholder="Share production details, fun facts, etc."></textarea>

    <button class="btn primary" type="post" style="margin-top: 20px;">Post Film</button>
    <a class="btn secondary" href="/">Cancel</a>

  </form>
  </div>
</section>
{% endblock %}
