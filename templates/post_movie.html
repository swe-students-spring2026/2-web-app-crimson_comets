{% extends 'base.html' %}

{% block content %}

<div class="page-nav">
  <button onclick="history.back()" class="btn secondary">
    ← Back
  </button>
</div>

<div class="center-header">
  <h2 class="page-title">
    {{ "Edit Your Film" if movie else "Post Your Film" }}
  </h2>

  {% if not movie %}
    <p class="muted subtitle">
      Post a film that you wrote or directed.
    </p>
  {% endif %}
</div>


<section class="card">
  <div class="card-body">
  <form method="POST" class="stack-form" action="/post" enctype="multipart/form-data">

    <label class="label" for="title">Movie Title *</label>
    <input 
      class="input" 
      id="title" 
      name="title" 
      type="text"
      value="{{ movie.title|default('') }}"
      placeholder="e.g. Dune" 
      required>

    <label class="label" for="year">Release Year *</label>
    <input 
      class="input" 
      id="year" 
      name="year" 
      type="text"
      value="{{ movie.year|default('') }}" 
      placeholder="e.g. 2026" 
      required>

    <label class="label" for="genre">Genre</label>
    <input 
      class="input" 
      id="genre" 
      name="genre" 
      type="text" 
      value="{{ movie.genre|default('') }}" 
      placeholder="e.g. Sci-Fi, Drama">

    <label class="label" for="logline">Log Line</label>
    <textarea 
      class="input" 
      id="logline" 
      name="logline" 
      rows="2" 
      placeholder="one sentence summary (remember to 'hook' your audience)">{{ movie.logline|default('') }}</textarea>

    <label class="label" for="runtime">Runtime</label>
    <input 
      class="input" 
      id="runtime" 
      name="runtime" 
      type="text" 
      value="{{ movie.runtime|default('') }}" 
      placeholder="e.g. 20 min">

    <label class="label" for="cast">Cast (comma-separated)</label>
    <input 
      class="input" 
      id="cast" 
      name="cast" 
      type="text" 
      value="{% for m in movie.cast %}{{ m.name }}: {{ m.role }}{% if not loop.last %}, {% endif %}{% endfor %}"
      placeholder="e.g., Timothée Chalamet, Zendaya">

    <label class="label" for="crew">Crew (comma-separated)</label>
    <input 
      class="input" 
      id="crew" name="crew" 
      type="text" 
      value="{% for m in movie.crew %}{{ m.name }}: {{ m.role }}{% if not loop.last %}, {% endif %}{% endfor %}"
      placeholder="e.g., Greig Fraser: Cinematographer">

    <label class="label" for="poster">Poster</label>
    <input class="input" type="file" id="poster" name="poster" accept="image/*">

    <label class="label" for="stills">Film Stills</label>
    <input class="input" type="file" id="stills" name="stills" accept="image/*">

    <label class="label" for="bts">BTS photos (optional)</label>
    <input class="input" type="file" id="bts" name="bts" accept="image/*">

    <label class="label" for="awards">Awards (optional)</label>
    <textarea 
      class="input" 
      id="awards" 
      name="awards" 
      rows="1" 
      placeholder="List awards here">{{ movie.awards|default('', true) }}</textarea>

    {% if movie %}
      <a class="btn secondary" href="{{ url_for('update_my_movie', movie_id=movie._id) }}">Save Changes</a>
    {% else %}
      <button class="btn primary" type="submit" style="margin-top: 20px;">Post Film</button>
    {% endif %}
      <a class="btn secondary" href="{{ url_for('home') }}">Cancel</a>

  </form>
  </div>
</section>
{% endblock %}
