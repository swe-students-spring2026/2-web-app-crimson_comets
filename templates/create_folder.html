{% extends "base.html" %}
{% block content %}


<div class="container narrow">
  <div style="margin-bottom:16px;">
    <a href="{{ url_for('home') }}" class="btn secondary">
      ← Back
    </a>
  </div>
  <div class="card">

    <h1 class="h1">Create Folder</h1>
    <p class="muted">Name your movie folder.</p>

    <form method="POST" action="{{ url_for('create_folder') }}" class="form">
      <label class="label">Folder Name</label>
      <input class="input" type="text" name="name" placeholder="e.g. Rom Coms" required />

      <div class="login-register">
        <button class="btn primary" type="submit">Create Folder</button>
      </div>
    </form>

  </div>
</div>

{% endblock %}
