{% extends "base.html" %}
{% block content %}
<div class="container narrow">
  <div class="card">
    <h1 class="h1">Movie App</h1>
    <p class="muted">Dummy login for frontend demo.</p>

    <form method="post" class="form">
      <label class="label">Username</label>
      <input class="input" name="username" placeholder="e.g. roger" />

      <label class="label">Role</label>
      <div class="row">
        <label class="radio">
          <input type="radio" name="role" value="user" checked />
          <span>General User</span>
        </label>
        <label class="radio">
          <input type="radio" name="role" value="filmmaker" />
          <span>Filmmaker</span>
        </label>
      </div>

      <button class="btn primary" type="submit">Log in</button>
    </form>
  </div>
</div>
{% endblock %}
